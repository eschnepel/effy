[mypy]
strict = True
ignore_missing_imports = True
mypy_path = custom_components

# Home Assistant base classes are typed as Any when stubs are absent.
# warn_unused_ignores = False suppresses the cascade of "unused type: ignore"
# errors that result from @callback and HA base-class decorators being untyped.
# Module names are resolved as "effy.*" because custom_components/ is a
# namespace package (no __init__.py, as required by Home Assistant).
# See ADR-000 §2 for the full rationale behind this per-file suppression
# approach (never a global disable_error_code).
[mypy-effy.config_flow]
warn_unused_ignores = False

[mypy-effy.sensor]
warn_unused_ignores = False

[mypy-effy.button]
warn_unused_ignores = False

[mypy-effy.coordinator]
warn_unused_ignores = False
